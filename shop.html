<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shop | Harmo-nery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="navbar">

    <div class="container">

        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Harmo-nery Logo">
        </a>

        <nav>

            <ul class="nav-links">

                <li><a href="shop.html?category=new">New Items</a></li>

                <li><a href="shop.html?category=stickers">Stickers</a></li>

                <li><a href="shop.html?category=accessories">Accessories</a></li>

            </ul>

        </nav>

        <div class="nav-icons">

            <i data-lucide="search"></i>

            <i data-lucide="user-round"></i>

            <i data-lucide="shopping-bag"></i>

        </div>

    </div>
    </header>
<section class="shop-hero">

    <div class="container narrow">

        <h1>Shop</h1>

        <p>
            Find something cozy for your next peaceful morning.
        </p>

    </div>

</section>
<section class="shop-toolbar">

    <div class="container">

        <button class="filter-btn">

            <i data-lucide="sliders-horizontal"></i>

            Filter

        </button>

        <button class="sort-btn">

            Date, New to Old

            <i data-lucide="chevron-down"></i>

        </button>

    </div>

</section>
<div class="product-card">

    <img src="assets/planner.png" alt="Blueberry Morning Planner">

    <h3>Blueberry Morning Planner</h3>

    <p class="price">$8.00</p>

    <div class="product-buttons">

        <a
            href="https://harmonery.gumroad.com/l/bunnii"
            class="primary-btn"
            target="_blank"
            rel="noopener"
        >
            Buy Now
        </a>

        <button class="secondary-btn add-cart-btn">
            Add to Cart
        </button>

    </div>

</div>

            <div class="product-card">

                <img src="assets/bunnii-placeholder.png" alt="BUNNII placeholder">

                <h3>Spring Garden Sticker Sheet</h3>

                <p class="price">$7.50</p>

            </div>

            <div class="product-card">

                <img src="assets/bunnii-placeholder.png" alt="bunnii-placeholder">

                <h3>BUNNII Acrylic Keychain</h3>

                <p class="price">$6.99</p>

            </div>

        </div>

    </div>

</section>
<script>
lucide.createIcons();
</script>
<script>

lucide.createIcons();

document.querySelectorAll(".add-cart-btn").forEach(button => {

    button.addEventListener("click", () => {

        alert("🛍️ Added to your cozy bag!");

    });

});

</script>
</body>

</html>
