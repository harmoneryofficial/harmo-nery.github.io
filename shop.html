<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shop | Harmo-nery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="navbar">

    <div class="container">

        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Harmo-nery Logo">
        </a>

        <nav>

            <ul class="nav-links">

                <li><a href="shop.html?category=new">New Items</a></li>

                <li><a href="shop.html?category=stickers">Stickers</a></li>

                <li><a href="shop.html?category=accessories">Accessories</a></li>

            </ul>

        </nav>

        <div class="nav-icons">

            <i data-lucide="search"></i>

            <i data-lucide="user-round"></i>

            <i data-lucide="shopping-bag"></i>

        </div>

    </div>
    </header>
<section class="shop-hero">

    <div class="container narrow">

        <h1>Shop</h1>

        <p>
            Find something cozy for your next peaceful morning.
        </p>

    </div>

</section>
<section class="shop-search">

    <div class="container narrow">

        <div class="search-box">

            <i data-lucide="search"></i>

            <input
                type="text"
                placeholder="Search planners, stickers, keychains..."
            >

        </div>

    </div>

</section>
<section class="shop-categories">

    <div class="container">

        <div class="category-pills">

            <button class="active">🌸 All</button>

            <button>✨ New Items</button>

            <button>🩷 Stickers</button>

            <button>🎀 Accessories</button>

        </div>

    </div>

</section>

<script>
lucide.createIcons();
</script>

</body>

</html>
