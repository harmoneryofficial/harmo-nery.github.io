<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shop | Harmo-nery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="navbar">

    <div class="container">

        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Harmo-nery Logo">
        </a>

        <nav>

            <ul class="nav-links">

                <li><a href="shop.html?category=new">New Items</a></li>

                <li><a href="shop.html?category=stickers">Stickers</a></li>

                <li><a href="shop.html?category=accessories">Accessories</a></li>

            </ul>

        </nav>

        <div class="nav-icons">

            <i data-lucide="search"></i>

            <i data-lucide="user-round"></i>

            <i data-lucide="shopping-bag"></i>

        </div>

    </div>
    </header>
    <div class="filter-overlay" id="filterOverlay"></div>

<aside class="filter-panel" id="filterPanel">

    <div class="filter-header">

        <h2>Filter</h2>

       <button id="closeFilter">

    <i data-lucide="x"></i>

</button>
    </div>

    <div class="filter-section">

        <h3>Product Type</h3>

        <label><input type="checkbox"> Planners</label>

        <label><input type="checkbox"> Sticker Sheets</label>

        <label><input type="checkbox"> Keychains</label>

        <label><input type="checkbox"> Hair Clips</label>

    </div>

    <div class="filter-section">

        <h3>Price</h3>

        <label><input type="radio" name="price"> Under $10</label>

        <label><input type="radio" name="price"> $10–20</label>

        <label><input type="radio" name="price"> $20+</label>

    </div>

    <button class="primary-btn filter-apply">

        Apply Filters

    </button>

</aside>
<section class="shop-hero">

    <div class="container narrow">

        <h1>Shop</h1>

        <p>
            Find something cozy for your next peaceful morning.
        </p>

    </div>

</section>
<section class="shop-toolbar">

    <div class="container">

<button class="filter-btn" id="openFilter">
            <i data-lucide="sliders-horizontal"></i>

            Filter

        </button>

        <button class="sort-btn">

            Date, New to Old

            <i data-lucide="chevron-down"></i>

        </button>

    </div>

</section>
<section class="product-grid">

    <div class="container">

        <div class="products">

            <!-- Product 1 -->
            <div class="product-card">

                <img src="assets/planner.png" alt="Blueberry Morning Planner">

                <h3>Blueberry Morning Planner</h3>

                <p class="price">$8.00</p>

                <div class="product-buttons">

                    <a
                        href="https://harmonery.gumroad.com/l/bunnii"
                        class="primary-btn"
                        target="_blank"
                        rel="noopener"
                    >
                        Buy Now
                    </a>

                    <button class="secondary-btn add-cart-btn">
                        Add to Cart
                    </button>

                </div>

            </div>

            <!-- Product 2 -->
            <div class="product-card">

                <img src="assets/bunnii-placeholder.png" alt="BUNNII placeholder">

                <h3>Spring Garden Sticker Sheet</h3>

                <p class="price">$7.50</p>

            </div>

            <!-- Product 3 -->
            <div class="product-card">

                <img src="assets/bunnii-placeholder.png" alt="BUNNII Acrylic Keychain">

                <h3>BUNNII Acrylic Keychain</h3>

                <p class="price">$6.99</p>

            </div>

        </div>

    </div>

</section>
<div class="toast" id="cartToast">

    <div class="toast-icon">

        <img src="assets/bunnii-placeholder.png" alt="BUNNII">

    </div>

    <div class="toast-text">

        <strong id="toastTitle"></strong>

        <p id="toastBody"></p>

    </div>

</div>

<script>

lucide.createIcons();

const toast = document.getElementById("cartToast");
const toastTitle = document.getElementById("toastTitle");
const toastBody = document.getElementById("toastBody");

const cozyMessages = [

{
title:"I'll keep this safe for you! ♡",
body:(name)=>`${name} has been added to your cozy bag.`
},

{
title:"BUNNII tucked this into your cozy bag! ♡",
body:(name)=>`${name} is waiting patiently for checkout.`
},

{
title:"One more cozy find! ✨",
body:(name)=>`${name} just joined your collection.`
},

{
title:"Saved with extra care. 🌸",
body:(name)=>`BUNNII is watching over ${name}.`
},

{
title:"A peaceful choice. ☁️",
body:(name)=>`${name} is safely tucked into your cozy bag.`
},

{
title:"Yay! 🎀",
body:(name)=>`BUNNII couldn't resist packing ${name} for you.`
}

];

document.querySelectorAll(".add-cart-btn").forEach(button => {

    button.addEventListener("click", () => {

        const productCard = button.closest(".product-card");

        const productName =
            productCard.querySelector("h3").textContent;

        let message;
        if (Math.random() < 0.02) {

            message = rareMessages[Math.floor(Math.random() * rareMessages.length)];

        } else {

            message = cozyMessages[Math.floor(Math.random() * cozyMessages.length)];

        }

        toastTitle.textContent = message.title;
        toastBody.textContent = message.body(productName);

        toast.classList.add("show");

        setTimeout(() => {

            toast.classList.remove("show");

        }, 5000);

    });

});
const filterPanel = document.getElementById("filterPanel");

const filterOverlay = document.getElementById("filterOverlay");

const openFilter = document.getElementById("openFilter");

const closeFilter = document.getElementById("closeFilter");

openFilter.addEventListener("click", () => {

    filterPanel.classList.add("show");

    filterOverlay.classList.add("show");

});

closeFilter.addEventListener("click", () => {

    filterPanel.classList.remove("show");

    filterOverlay.classList.remove("show");

});

filterOverlay.addEventListener("click", () => {

    filterPanel.classList.remove("show");

    filterOverlay.classList.remove("show");

});

</script>

</body>

</html>
