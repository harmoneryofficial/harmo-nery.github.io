<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shop | Harmo-nery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="navbar">

    <div class="container">

        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Harmo-nery Logo">
        </a>

        <nav>

            <ul class="nav-links">

                <li><a href="shop.html?category=new">New Items</a></li>

                <li><a href="shop.html?category=stickers">Stickers</a></li>

                <li><a href="shop.html?category=accessories">Accessories</a></li>

            </ul>

        </nav>

       <div class="nav-icons">

    <i data-lucide="search" id="openSearch"></i>

    <i data-lucide="user-round"></i>

    <i data-lucide="shopping-bag"></i>

</div>

    </div>
    
    </header>
    <div class="search-overlay" id="searchOverlay">

    <div class="search-container">

        <div class="search-wrapper">

            <i data-lucide="search"></i>

            <input
                type="text"
                id="searchInput"
                autocomplete="off"
            >

            <div id="typewriterOverlay">

                <span id="typewriterText"></span>

                <span id="bunnyCursor">🐇</span>

            </div>

            <button id="closeSearch">

                <i data-lucide="x"></i>

            </button>

        </div>

    </div>

</div>
    <div class="filter-overlay" id="filterOverlay"></div>

<aside class="filter-panel" id="filterPanel">

    <div class="filter-header">

        <h2>Filter</h2>

       <button id="closeFilter">

    <i data-lucide="x"></i>

</button>
    </div>

    <div class="filter-section">

        <h3>Product Type</h3>

    <label>

    <input
        type="checkbox"
        id="plannerFilter"
    >

    Planners

</label>

<label>

    <input
        type="checkbox"
        id="stickerFilter"
    >

    Sticker Sheets

</label>

<label>

    <input
        type="checkbox"
        id="keychainFilter"
    >

    Keychains

</label>

    </div>

    <div class="filter-section">

        <h3>Price</h3>

        <label><input type="radio" name="price"> Under $10</label>

        <label><input type="radio" name="price"> $10–20</label>

        <label><input type="radio" name="price"> $20+</label>

    </div>

    <button
    class="primary-btn filter-apply"
    id="applyFilters"
>

    Apply Filters

</button>
</aside>
<section class="shop-hero">

    <div class="container narrow">

        <h1>Shop</h1>

        <p>
            Find something cozy for your next peaceful morning.
        </p>

    </div>

</section>
<section class="shop-toolbar">

    <div class="container">

<button class="filter-btn" id="openFilter">
            <i data-lucide="sliders-horizontal"></i>

            Filter

        </button>

       <div class="sort-box">

    <label for="sortProducts">Sort</label>

    <select id="sortProducts">

        <option value="newest">Newest</option>

        <option value="low-high">Price: Low to High</option>

        <option value="high-low">Price: High to Low</option>

        <option value="az">A–Z</option>

    </select>

</div>

</section>
<section class="product-grid">

    <div class="container">

        <div class="products">

            <!-- Product 1 -->
<div
class="product-card"
data-type="planner"
data-price="8"
data-search="planner blueberry daily printable journal productivity notes study school morning cozy">
>
                <img src="assets/planner.png" alt="Blueberry Morning Planner">

                <h3>Blueberry Morning Planner</h3>

                <p class="price">$8.00</p>

                <div class="product-buttons">

                    <a
                        href="https://harmonery.gumroad.com/l/bunnii"
                        class="primary-btn"
                        target="_blank"
                        rel="noopener"
                    >
                        Buy Now
                    </a>

                    <button class="secondary-btn add-cart-btn">
                        Add to Cart
                    </button>

                </div>

            </div>

            <!-- Product 2 -->
<div
class="product-card"
data-type="sticker"
data-price="7.5"
data-search="sticker bunny spring flowers pink cute kawaii deco">
>
                <img src="assets/bunnii-placeholder.png" alt="BUNNII placeholder">

                <h3>Spring Garden Sticker Sheet</h3>

                <p class="price">$7.50</p>

            </div>

            <!-- Product 3 -->
<div
class="product-card"
data-type="keychain"
data-price="6.99"
data-search="keychain acrylic bunny accessory cute bag charm">
>
                <img src="assets/bunnii-placeholder.png" alt="BUNNII Acrylic Keychain">

                <h3>BUNNII Acrylic Keychain</h3>

                <p class="price">$6.99</p>

            </div>

        </div>

    </div>

</section>
<div class="toast" id="cartToast">

    <div class="toast-icon">

        <img src="assets/bunnii-placeholder.png" alt="BUNNII">

    </div>

    <div class="toast-text">

        <strong id="toastTitle"></strong>

        <p id="toastBody"></p>

    </div>

</div>
<script>

lucide.createIcons();

const toast = document.getElementById("cartToast");
const toastTitle = document.getElementById("toastTitle");
const toastBody = document.getElementById("toastBody");

const cozyMessages = [

{
title:"I'll keep this safe for you! ♡",
body:(name)=>`${name} has been added to your cozy bag.`
},

{
title:"BUNNII tucked this into your cozy bag! ♡",
body:(name)=>`${name} is waiting patiently for checkout.`
},

{
title:"One more cozy find! ✨",
body:(name)=>`${name} just joined your collection.`
},

{
title:"Saved with extra care. 🌸",
body:(name)=>`BUNNII is watching over ${name}.`
},

{
title:"A peaceful choice. ☁️",
body:(name)=>`${name} is safely tucked into your cozy bag.`
},

{
title:"Yay! 🎀",
body:(name)=>`BUNNII couldn't resist packing ${name} for you.`
}

];
const rareMessages = [

{
title:"🌟 Lucky Day!",
body:(name)=>`BUNNII did a happy dance because you added ${name}!`
},

{
title:"Stay Harmonious. ♡",
body:(name)=>`Thank you for supporting Harmo-nery. ${name} is packed with extra care.`
},

{
title:"✨ Secret Cozy Message!",
body:(name)=>`You found a rare BUNNII message while adding ${name}!`
}

];

document.querySelectorAll(".add-cart-btn").forEach(button => {

    button.addEventListener("click", () => {

        const productCard = button.closest(".product-card");

        const productName =
            productCard.querySelector("h3").textContent;

        let message;
        if (Math.random() < 0.02) {

            message = rareMessages[Math.floor(Math.random() * rareMessages.length)];

        } else {

            message = cozyMessages[Math.floor(Math.random() * cozyMessages.length)];

        }

        toastTitle.textContent = message.title;
        toastBody.textContent = message.body(productName);

        toast.classList.add("show");

        setTimeout(() => {

            toast.classList.remove("show");

        }, 5000);

    });

});
const filterPanel = document.getElementById("filterPanel");

const filterOverlay = document.getElementById("filterOverlay");

const openFilter = document.getElementById("openFilter");

const closeFilter = document.getElementById("closeFilter");

openFilter.addEventListener("click", () => {

    filterPanel.classList.add("show");

    filterOverlay.classList.add("show");

});

closeFilter.addEventListener("click", () => {

    filterPanel.classList.remove("show");

    filterOverlay.classList.remove("show");

});

filterOverlay.addEventListener("click", () => {

    filterPanel.classList.remove("show");

    filterOverlay.classList.remove("show");

});

const applyFilters = document.getElementById("applyFilters");

applyFilters.addEventListener("click", () => {

    const plannerChecked =
        document.getElementById("plannerFilter").checked;

    const stickerChecked =
        document.getElementById("stickerFilter").checked;

    const keychainChecked =
        document.getElementById("keychainFilter").checked;

    document.querySelectorAll(".product-card").forEach(card => {

        const type = card.dataset.type;

        let show = true;

        if (
            plannerChecked ||
            stickerChecked ||
            keychainChecked
        ){

            show = false;

            if(type === "planner" && plannerChecked)
                show = true;

            if(type === "sticker" && stickerChecked)
                show = true;

            if(type === "keychain" && keychainChecked)
                show = true;

        }

        card.style.display = show ? "block" : "none";

    });

    filterPanel.classList.remove("show");

    filterOverlay.classList.remove("show");

});
const sortProducts = document.getElementById("sortProducts");

sortProducts.addEventListener("change", () => {

    const products = document.querySelector(".products");

    const cards = [...products.querySelectorAll(".product-card")];

    switch(sortProducts.value){

        case "low-high":

            cards.sort((a,b)=>
                parseFloat(a.dataset.price)-parseFloat(b.dataset.price));

            break;

        case "high-low":

            cards.sort((a,b)=>
                parseFloat(b.dataset.price)-parseFloat(a.dataset.price));

            break;

        case "az":

            cards.sort((a,b)=>
                a.querySelector("h3").textContent.localeCompare(
                b.querySelector("h3").textContent));

            break;

        default:

            cards.reverse();

    }

    cards.forEach(card=>products.appendChild(card));

});
/* ===========================
   BUNNII Typewriter Search
=========================== */

const searchMessages = [

    "Search for something cozy...",
    "Looking for planners...",
    "Need stickers today?",
    "BUNNII can help!",
    "Stay Harmonious. ♡",
    "Looking for something sweet? 🫐",
    "Find your next favorite..."

];

const rareSearchMessages = [

    "You're one of BUNNII's favorite visitors. ♡",
    "Have you had water today? 💧",
    "I'm glad you're here. ☁️",
    "BUNNII is cheering you on!",
    "Psst... I hid something cute somewhere."

];

const searchInput = document.getElementById("searchInput");

const overlay = document.getElementById("typewriterOverlay");

const typewriterText = document.getElementById("typewriterText");

const bunnyCursor = document.getElementById("bunnyCursor");

let searchIndex = 0;
let charIndex = 0;
let deleting = false;

function typeSearch(){

    if(document.activeElement === searchInput){

        setTimeout(typeSearch,200);

        return;

    }

    const pool =
        Math.random() < 0.01
            ? rareSearchMessages
            : searchMessages;

    const message = pool[searchIndex % pool.length];

    if(!deleting){

        charIndex++;

    }else{

        charIndex--;

    }

    typewriterText.textContent =
        message.substring(0,charIndex);

    let speed = deleting ? 35 : 60;

    if(!deleting && charIndex === message.length){

        deleting = true;

        speed = 1800;

        bunnyCursor.classList.add("hop");

        setTimeout(()=>{

            bunnyCursor.classList.remove("hop");

        },400);

    }

    if(deleting && charIndex === 0){

        deleting = false;

        searchIndex++;

        speed = 450;

    }

    setTimeout(typeSearch,speed);

}

typeSearch();

/* Hide BUNNII while typing */

searchInput.addEventListener("focus", () => {

    overlay.style.opacity = "0";

});

searchInput.addEventListener("blur", () => {

    if (searchInput.value === "") {

        overlay.style.opacity = "1";

    }

});

searchInput.addEventListener("input", () => {

    if (searchInput.value.length > 0) {

        overlay.style.opacity = "0";

    } else {

        overlay.style.opacity = "1";

    }

});
/* ===========================
   Search Overlay
=========================== */

const searchOverlay = document.getElementById("searchOverlay");

const openSearch = document.getElementById("openSearch");

const closeSearch = document.getElementById("closeSearch");

openSearch.addEventListener("click",()=>{

    searchOverlay.classList.add("show");

    searchInput.focus();

});

closeSearch.addEventListener("click",()=>{

    searchOverlay.classList.remove("show");

});

searchOverlay.addEventListener("click",(e)=>{

    if(e.target===searchOverlay){

        searchOverlay.classList.remove("show");

    }

});
/* ===========================
   Live Product Search
=========================== */

searchInput.addEventListener("input", () => {

    const search = searchInput.value.trim().toLowerCase();

    document.querySelectorAll(".product-card").forEach(card => {

        const title = card.querySelector("h3").textContent.toLowerCase();

        const tags = (card.dataset.search || "").toLowerCase();

        if (
            title.includes(search) ||
            tags.includes(search) ||
            search === ""
        ){

            card.style.display = "block";

        } else {

            card.style.display = "none";

        }

    });

});

</script>

</body>

</html>
